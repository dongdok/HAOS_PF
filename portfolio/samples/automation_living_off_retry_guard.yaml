alias: "[샘플][조명] 밤 시간 거실 소등 재시도"
description: "거실 비재실 + 타 구역 비재실 + 심야 시간에서, 거실 조명이 켜져 있으면 5초 간격으로 소등 재시도"
mode: single
trigger:
  - platform: state
    entity_id: binary_sensor.living_presence
    to: "off"
  - platform: time_pattern
    seconds: "/5"
condition:
  - condition: time
    after: "23:00:00"
    before: "06:00:00"
  - condition: state
    entity_id: binary_sensor.living_presence
    state: "off"
  - condition: state
    entity_id: binary_sensor.kitchen_presence
    state: "off"
  - condition: state
    entity_id: binary_sensor.bathroom_presence
    state: "off"
  - condition: state
    entity_id: binary_sensor.dressing_room_presence
    state: "off"
  - condition: template
    value_template: >-
      {{ is_state('light.living_line_light', 'on') or
         is_state('light.living_stand_light', 'on') }}
action:
  - choose:
      - conditions:
          - condition: state
            entity_id: light.living_line_light
            state: "on"
        sequence:
          - service: light.turn_off
            target:
              entity_id: light.living_line_light
  - choose:
      - conditions:
          - condition: state
            entity_id: light.living_stand_light
            state: "on"
        sequence:
          - service: light.turn_off
            target:
              entity_id: light.living_stand_light
