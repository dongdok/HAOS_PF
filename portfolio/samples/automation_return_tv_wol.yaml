alias: "[샘플][복귀] TV 명시적 WOL 기동"
description: "복귀 조건 충족 시 암묵적 TV turn_on 대신 명시적 WOL 매직패킷을 전송"
mode: single
trigger:
  - platform: state
    entity_id: input_boolean.return_mode
    to: "on"
condition:
  - condition: state
    entity_id: media_player.living_tv
    state: "off"
action:
  - service: wake_on_lan.send_magic_packet
    data:
      mac: "E8:AA:CB:EE:8B:FC"
      broadcast_address: "192.168.10.255"
      broadcast_port: 9
  - delay: "00:00:03"
  - service: media_player.turn_on
    target:
      entity_id: media_player.living_tv
